<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Fitbit dots (left side) -->
  <g transform="translate(80, 256)">
    <circle cx="0" cy="-90" r="18" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="0" cy="-40" r="18" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="0" cy="10" r="18" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="0" cy="60" r="18" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="0" cy="110" r="18" fill="#ff6b6b" opacity="0.9"/>

    <!-- Subtle glow -->
    <circle cx="0" cy="-90" r="28" fill="#ff6b6b" opacity="0.1"/>
    <circle cx="0" cy="-40" r="28" fill="#ff6b6b" opacity="0.1"/>
    <circle cx="0" cy="10" r="28" fill="#ff6b6b" opacity="0.1"/>
    <circle cx="0" cy="60" r="28" fill="#ff6b6b" opacity="0.1"/>
    <circle cx="0" cy="110" r="28" fill="#ff6b6b" opacity="0.1"/>
  </g>

  <!-- Garmin triangle (right side) -->
  <g transform="translate(432, 256)">
    <polygon points="0,-110 95,55 -95,55" fill="url(#fg)" opacity="0.9" stroke="#00d4aa" stroke-width="2"/>

    <!-- Inner triangle -->
    <polygon points="0,-65 55,32 -55,32" fill="none" stroke="#00b4d8" stroke-width="3" opacity="0.6"/>

    <!-- Subtle glow -->
    <polygon points="0,-110 95,55 -95,55" fill="url(#fg)" opacity="0.08"/>
  </g>

  <!-- Conversion arrow -->
  <g transform="translate(256, 256)">
    <!-- Arrow line -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

    <!-- Arrowhead -->
    <polygon points="100,-14 130,0 100,14" fill="url(#arrow)" opacity="0.9"/>

    <!-- Arrow dots along path -->
    <circle cx="-55" cy="0" r="4" fill="#00b4d8" opacity="0.5"/>
    <circle cx="-30" cy="0" r="5" fill="#00b4d8" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#00c8c4" opacity="0.7"/>
    <circle cx="30" cy="0" r="5" fill="#00d0b6" opacity="0.6"/>
    <circle cx="55" cy="0" r="4" fill="#00d4aa" opacity="0.5"/>
  </g>

  <!-- Text "f2g" -->
  <text x="256" y="430" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="42" font-weight="bold" fill="#8892b0" letter-spacing="8">
    f2g
  </text>

  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="12" fill="#4a5568" letter-spacing="4">
    fitbit → garmin
  </text>

  <!-- Decorative corner arcs -->
  <path d="M 30 120 A 90 90 0 0 1 120 30" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <path d="M 482 120 A 90 90 0 0 0 392 30" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <path d="M 30 392 A 90 90 0 0 0 120 482" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
  <path d="M 482 392 A 90 90 0 0 1 392 482" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
</svg>
